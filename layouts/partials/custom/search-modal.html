<div class="search-modal" id="search-modal">
    <div class="search-modal-overlay"></div>
    <div class="search-modal-container">
        <button class="search-modal-close" id="search-close" aria-label="关闭">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="search-modal-input-wrapper">
            <svg class="search-modal-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" class="search-modal-input" placeholder="搜索文章..." autocomplete="off" spellcheck="false">
        </div>
        <div class="search-modal-results" id="search-results"></div>
    </div>
</div>
