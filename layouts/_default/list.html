{{ define "main" }}
<div class="list-page">
    <div class="glass-card">
        <div class="list-page-header">
            <h1 class="list-page-title">{{ .Title }}</h1>
            <p class="list-page-count">共 {{ len .Pages }} 篇文章</p>
        </div>
        <div class="list-page-articles">
            {{ range .Pages }}
            <a href="{{ .Permalink }}" class="list-article-item">
                <span class="list-article-date">{{ .Date.Format "2006-01-02" }}</span>
                <span class="list-article-title">{{ .Title }}</span>
                {{ with .Params.categories }}
                <span class="list-article-cat">{{ index . 0 }}</span>
                {{ end }}
            </a>
            {{ end }}
        </div>
    </div>
</div>
{{ end }}
