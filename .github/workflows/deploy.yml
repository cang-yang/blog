name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.0
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Hugo Module Get
        run: hugo mod get

      - name: Build
        run: hugo --gc --minify --baseURL "https://blog.canggo.com/"

      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "=== 密钥诊断 ==="
          echo "首行: $(head -1 ~/.ssh/deploy_key)"
          echo "末行: $(tail -1 ~/.ssh/deploy_key)"
          echo "行数: $(wc -l < ~/.ssh/deploy_key)"
          echo "字节: $(wc -c < ~/.ssh/deploy_key)"

          echo "=== SSH 详细调试 ==="
          ssh -vvv -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo 'SSH连接成功!'" 2>&1 | tail -40

          echo "=== 同步文件 ==="
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            public/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/blog/

          rm -f ~/.ssh/deploy_key
          echo "=== 部署完成 ==="