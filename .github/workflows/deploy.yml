name: Debug Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "=== 1. 文件大小 ==="
          wc -c ~/.ssh/deploy_key

          echo "=== 2. 第一行内容 ==="
          head -1 ~/.ssh/deploy_key

          echo "=== 3. 最后一行内容 ==="
          tail -1 ~/.ssh/deploy_key

          echo "=== 4. 总行数 ==="
          wc -l ~/.ssh/deploy_key

          echo "=== 5. 检查有没有 Windows 换行符 ==="
          file ~/.ssh/deploy_key

          echo "=== 6. 检查有没有隐藏字符 ==="
          cat -A ~/.ssh/deploy_key | head -3

          echo "=== 7. 尝试加载密钥 ==="
          ssh-keygen -l -f ~/.ssh/deploy_key 2>&1 || true

          echo "=== 调试完成 ==="