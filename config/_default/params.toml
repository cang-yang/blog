mainSections = ["post"]
rssFullContent = true
favicon        = "img/favicon.png"
SortBy         = "default"

[footer]
    since      = 2025
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji    = "🧑‍💻"
    subtitle = "Java 后端开发者 | 2027届"
    avatar   = "img/avatar.png"

[article]
    headingAnchor = true
    math          = false
    readingTime   = true

    [article.license]
        enabled = false
        default = ""

[widgets]
    homepage = [
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
        { type = "archives", params = { limit = 5 } },
        { type = "search" },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled  = false
    provider = ""


# ===== 博客改造 v2.0 配置 =====
[background]
    type = "video"
    video = "media/backg.mp4"
    fallback = "media/bg-fallback.jpg"

[navbar]
    searchEnabled = true
